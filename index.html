<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元捷 AI 教官</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1E1E1E;
    --dark4: #2A2A2A;
    --text: #F0EDE8;
    --text-muted: #888;
    --text-dim: #555;
    --red: #E85D4A;
    --green: #4CAF7D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== LOGIN ===== */
  #loginPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(circle at center, #222 0%, #000 100%);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    transition: opacity 0.5s ease;
  }
  .login-card {
    background: var(--dark2); padding: 40px; border-radius: 20px;
    width: 90%; max-width: 400px; border: 1px solid var(--dark4);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
  }
  .login-card h1 { font-family: 'Noto Serif TC', serif; color: var(--gold); margin-bottom: 30px; font-weight: 900; }
  .login-card input {
    width: 100%; padding: 12px; background: var(--dark3); border: 1px solid var(--dark4);
    color: white; border-radius: 8px; margin-bottom: 15px; outline: none;
  }
  .login-card button {
    width: 100%; padding: 12px; background: var(--gold); border: none;
    color: black; font-weight: bold; border-radius: 8px; cursor: pointer;
  }

  /* ===== APP LAYOUT ===== */
  #appContainer { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
  
  /* Sidebar */
  aside { background: var(--dark2); border-right: 1px solid var(--dark4); display: flex; flex-direction: column; }
  .side-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--dark4); }
  .side-header h2 { font-family: 'Noto Serif TC', serif; color: var(--gold); font-size: 1.5rem; }
  .user-badge { margin: 20px; padding: 15px; background: var(--dark3); border-radius: 12px; border-left: 4px solid var(--gold); }
  .user-badge small { color: var(--text-muted); display: block; margin-bottom: 4px; }
  .user-badge .name { font-weight: bold; font-size: 1.1rem; }
  .user-badge .exp { color: var(--gold-light); font-weight: bold; margin-top: 5px; font-size: 0.9rem; }
  
  nav { flex: 1; padding: 10px; }
  .nav-item {
    display: flex; align-items: center; padding: 14px 20px; border-radius: 10px;
    cursor: pointer; transition: 0.3s; color: var(--text-muted); margin-bottom: 5px;
  }
  .nav-item:hover { background: var(--dark3); color: white; }
  .nav-item.active { background: var(--gold); color: black; font-weight: bold; }
  .nav-item i { margin-right: 12px; font-style: normal; }

  /* Main Content */
  main { flex: 1; overflow-y: auto; background: var(--dark); position: relative; }
  .view { display: none; padding: 40px; max-width: 1000px; margin: 0 auto; min-height: 100%; }
  .view.active { display: flex; flex-direction: column; }

  /* Chat Area */
  .chat-box { flex: 1; background: var(--dark2); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid var(--dark4); overflow: hidden; margin-bottom: 20px; min-height: 400px;}
  .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
  .input-group { padding: 20px; background: var(--dark3); display: flex; gap: 10px; border-top: 1px solid var(--dark4); }
  .input-group input { flex: 1; background: var(--dark); border: 1px solid var(--dark4); padding: 12px 20px; border-radius: 30px; color: white; outline: none; }
  .input-group button { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: black; font-weight: bold; }

  /* Message Bubbles */
  .msg-row { display: flex; margin-bottom: 10px; width: 100%; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.ai { justify-content: flex-start; }
  .msg-bubble { max-width: 80%; padding: 12px 18px; border-radius: 18px; line-height: 1.6; font-size: 0.95rem; }
  .user .msg-bubble { background: var(--gold); color: black; border-bottom-right-radius: 4px; }
  .ai .msg-bubble { background: var(--dark4); color: var(--text); border-bottom-left-radius: 4px; }

  .score-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: bold; margin-bottom: 8px; }
  .score-high { background: var(--green); color: white; }
  .score-mid { background: var(--gold); color: black; }
  .score-low { background: var(--red); color: white; }

  /* Selection UI */
  .selection-grid { display: grid; grid-template-columns: repeat(auto-fill, min-minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
  .situation-card {
    background: var(--dark3); padding: 15px; border-radius: 12px; cursor: pointer;
    border: 1px solid var(--dark4); transition: 0.3s;
  }
  .situation-card:hover { border-color: var(--gold); }
  .situation-card.active { background: var(--gold); color: black; border-color: var(--gold); }

  /* Typing Animation */
  .typing { display: flex; gap: 5px; padding: 10px; }
  .typing span { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: blink 1.4s infinite both; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

  @media (max-width: 768px) {
    #appContainer { grid-template-columns: 1fr; }
    aside { display: none; }
  }
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-card">
    <h1>元捷 AI 教官</h1>
    <input type="text" id="username" placeholder="帳號">
    <input type="password" id="password" placeholder="密碼">
    <button onclick="login()">進入道館</button>
    <p style="margin-top:15px; font-size:0.8rem; color:var(--text-muted)">預設：admin / yuanjie2024</p>
  </div>
</div>

<div id="appContainer">
  <aside>
    <div class="side-header">
      <h2>元捷通訊處</h2>
    </div>
    <div class="user-badge">
      <small>夥伴實力認證</small>
      <div class="name" id="userName">黎威德</div>
      <div class="exp" id="expBadge">0 分</div>
    </div>
    <nav>
      <div class="nav-item active" onclick="showView('practice')"><i>⚔️</i> 反對實戰</div>
      <div class="nav-item" onclick="showView('qa')"><i>🧠</i> 處經理萬事通</div>
      <div class="nav-item" onclick="logout()"><i>🚪</i> 登出</div>
    </nav>
  </aside>

  <main>
    <div id="practiceView" class="view active">
      <h2 style="margin-bottom:20px; font-family:'Noto Serif TC'">⚔️ 10大反對問題實戰</h2>
      <div class="selection-grid" id="situationList">
        </div>
      <div class="chat-box">
        <div class="messages" id="practiceMessages"></div>
        <div class="input-group">
          <input type="text" id="practiceInput" placeholder="輸入你的實戰話術..." onkeypress="if(event.key==='Enter') sendPractice()">
          <button id="practiceSend" onclick="sendPractice()">▶</button>
        </div>
      </div>
    </div>

    <div id="qaView" class="view">
      <h2 style="margin-bottom:20px; font-family:'Noto Serif TC'">🧠 主管萬事通</h2>
      <p style="color:var(--text-muted); margin-bottom:20px;">你可以詢問任何關於：名單開發、社大經營、理財矩陣、FACT技巧、增員等問題。</p>
      <div class="chat-box">
        <div class="messages" id="qaMessages"></div>
        <div class="input-group">
          <input type="text" id="qaInput" placeholder="請教主管..." onkeypress="if(event.key==='Enter') sendQA()">
          <button id="qaSend" onclick="sendQA()">▶</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ===== 配置區 (請更換為您的 Worker 網址) =====
const WORKER_URL = 'https://weathered-limit-374ayuanjie-ai.wader3534.workers.dev';

// ===== 數據庫 =====
const OBJECTIONS = [
  { id: 'need', title: '1. 不需要/已有健保', hint: '同步觀念好，切入備胎比喻。' },
  { id: 'interest', title: '2. 沒興趣/沒感覺', hint: '保險非興趣，切入印鈔機比喻。' },
  { id: 'money', title: '3. 沒錢/預算不足', hint: '10%保全觀念，三五千也可以。' },
  { id: 'parent', title: '4. 已買過/父母買了', hint: '切入健診，確認缺口。' },
  { id: 'think', title: '5. 考慮中/想一下', hint: '先簽再考慮法，卡位保障。' },
  { id: 'friend', title: '6. 朋友做/人情壓力', hint: '強調專業理賠與系統化服務。' },
  { id: 'invest', title: '7. 想理財/我自己存', hint: '10%防守 vs 30%攻擊。' },
  { id: 'long', title: '8. 繳太長/20年太久', hint: '退休長跑與鎖利存本觀念。' },
  { id: 'family', title: '9. 家人反對/不同意', hint: '釐清反對原因，強調愛與責任。' },
  { id: 'salary', title: '10. 增員/我要拿底薪', hint: '禁止說底薪，強調創業利潤。' }
];

let currentUser = null;
let currentSituation = '不需要/已有健保';
const SESSION_KEY = 'yuanjie_user_session';
const USER_DB_KEY = 'yuanjie_users_db';

// ===== 核心功能 =====

// 1. 初始化
window.onload = () => {
  initUsers();
  renderSituations();
  const saved = localStorage.getItem(SESSION_KEY);
  if(saved) {
    currentUser = JSON.parse(saved);
    loginSuccess();
  }
};

function initUsers() {
  if(!localStorage.getItem(USER_DB_KEY)) {
    const defaultUsers = [{ username: 'admin', password: 'yuanjie2024', name: '黎威德教官', exp: 0 }];
    localStorage.setItem(USER_DB_KEY, JSON.stringify(defaultUsers));
  }
}

function renderSituations() {
  const list = document.getElementById('situationList');
  OBJECTIONS.forEach(obj => {
    const card = document.createElement('div');
    card.className = 'situation-card' + (obj.title === currentSituation ? ' active' : '');
    card.innerHTML = `<strong>${obj.title}</strong><br><small style="font-size:0.7rem; opacity:0.7">${obj.hint}</small>`;
    card.onclick = () => {
      document.querySelectorAll('.situation-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      currentSituation = obj.title;
      const msgs = document.getElementById('practiceMessages');
      msgs.innerHTML = '';
      addMessage(msgs, 'ai', `現在開始演練「${currentSituation}」。當客戶這樣說時，你會如何回應？`);
    };
    list.appendChild(card);
  });
}

// 2. 登入邏輯
function login() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const users = JSON.parse(localStorage.getItem(USER_DB_KEY));
  const user = users.find(x => x.username === u && x.password === p);
  
  if(user) {
    currentUser = user;
    localStorage.setItem(SESSION_KEY, JSON.stringify(user));
    loginSuccess();
  } else {
    alert('帳號或密碼錯誤');
  }
}

function loginSuccess() {
  document.getElementById('loginPage').style.opacity = '0';
  setTimeout(() => document.getElementById('loginPage').style.display = 'none', 500);
  document.getElementById('appContainer').style.display = 'grid';
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('expBadge').textContent = currentUser.exp + ' 分';
  addMessage(document.getElementById('practiceMessages'), 'ai', `威德教官您好，準備好開始今天的實戰修練了嗎？目前選擇關卡：${currentSituation}`);
}

function logout() {
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

// 3. AI 呼叫 (精簡傳輸)
async function callAI(promptText) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: promptText })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.answer;
}

// 實戰發送
async function sendPractice() {
  const input = document.getElementById('practiceInput');
  const val = input.value.trim();
  if (!val || input.disabled) return;

  const msgs = document.getElementById('practiceMessages');
  addMessage(msgs, 'user', val);
  input.value = '';
  input.disabled = true;

  const typing = addTyping(msgs);
  
  // 網頁端只需發送情境與學員話術，Worker 會自動套用大腦
  const prompt = `[實戰演練模式] 情境：${currentSituation}。學員回答：「${val}」。請教官根據元捷大腦進行 0-100 評分並提供 400 字以上深度講評。`;

  try {
    const answer = await callAI(prompt);
    typing.remove();

    const scoreMatch = answer.match(/【評分】[：:]\s*(\d+)/);
    const score = scoreMatch ? parseInt(scoreMatch[1]) : 60;
    
    // 更新本地分數
    if (score > currentUser.exp) {
      currentUser.exp = score;
      let users = JSON.parse(localStorage.getItem(USER_DB_KEY));
      let idx = users.findIndex(u => u.username === currentUser.username);
      users[idx].exp = score;
      localStorage.setItem(USER_DB_KEY, JSON.stringify(users));
      localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
      document.getElementById('expBadge').textContent = score + ' 分';
    }

    const html = `<span class="score-badge ${score >= 80 ? 'score-high' : score >= 60 ? 'score-mid' : 'score-low'}">評分：${score} 分</span><br>${answer.replace(/\n/g, '<br>')}`;
    addMessage(msgs, 'ai', html, true);
    if(score >= 80) addMessage(msgs, 'ai', '🔥 漂亮！符合元捷標準話術！');
  } catch(e) {
    typing.remove();
    addMessage(msgs, 'ai', '⚠️ 通訊異常，請確認 Cloudflare Worker 是否正常運作。');
  }
  input.disabled = false;
  input.focus();
}

// 萬事通發送
async function sendQA() {
  const input = document.getElementById('qaInput');
  const val = input.value.trim();
  if (!val || input.disabled) return;

  const msgs = document.getElementById('qaMessages');
  addMessage(msgs, 'user', val);
  input.value = '';
  input.disabled = true;

  const typing = addTyping(msgs);
  const prompt = `[萬事通模式] 同仁詢問：『${val}』。請提供具體教材 SOP 或比喻。`;

  try {
    const answer = await callAI(prompt);
    typing.remove();
    addMessage(msgs, 'ai', answer.replace(/\n/g, '<br>'), true);
  } catch(e) {
    typing.remove();
    addMessage(msgs, 'ai', '⚠️ 通訊異常。');
  }
  input.disabled = false;
}

// 4. UI 輔助
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(viewId + 'View').classList.add('active');
  event.currentTarget.classList.add('active');
}

function addMessage(container, role, content, isHtml = false) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (isHtml) bubble.innerHTML = content;
  else bubble.textContent = content;
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function addTyping(container) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = '<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
  return row;
}
</script>
</body>
</html>
